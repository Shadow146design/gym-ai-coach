<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Accueil — Gym AI Coach</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/home.html">
    <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="10" width="3" height="4" rx="1" fill="currentColor"/><rect x="6" y="8" width="2.5" height="8" rx="1" fill="currentColor"/><rect x="9.5" y="11" width="5" height="2" fill="currentColor"/><rect x="15.5" y="8" width="2.5" height="8" rx="1" fill="currentColor"/><rect x="19" y="10" width="3" height="4" rx="1" fill="currentColor"/></svg>
    Gym AI Coach
  </a>
  <nav class="nav-links">
    <span id="nav-role-link"></span>
    <a href="/home.html" class="active">Accueil</a>
    <a href="/dashboard.html">Programme</a>
    <a href="/session.html">Séance</a>
    <a href="/stats.html">Stats</a>
    <a href="/profile.html">Profil</a>
    <button class="btn-theme" id="theme-toggle">🌙</button>
    <a href="#" id="logout-link">Déco</a>
  </nav>
</header>

<div class="shell">

  <!-- Hero : greeting + streak + CTA -->
  <div class="home-hero">
    <div class="home-hero-left">
      <div class="home-greeting" id="greeting">Bonjour !</div>
      <div class="home-last" id="last-session-txt"></div>
      <a class="btn btn-primary" href="/session.html" style="margin-top:18px;width:fit-content">▶ Commencer la séance</a>
    </div>
    <div class="streak-block">
      <div class="streak-fire">🔥</div>
      <div class="streak-num" id="streak-num">—</div>
      <div class="streak-lbl">jours de suite</div>
    </div>
  </div>

  <!-- Barre stats rapides -->
  <div class="home-stats-bar">
    <div class="hstat"><div class="hstat-val" id="stat-sessions">—</div><div class="hstat-lbl">Séances</div></div>
    <div class="hstat-sep"></div>
    <div class="hstat"><div class="hstat-val" id="stat-best">—</div><div class="hstat-lbl">Record streak</div></div>
    <div class="hstat-sep"></div>
    <div class="hstat"><div class="hstat-val" id="stat-assiduite">—</div><div class="hstat-lbl">Assiduité 4 sem.</div></div>
  </div>

  <!-- Prochaine séance -->
  <div class="home-card" style="border-left:3px solid var(--rust)">
    <div class="home-card-title">📅 Prochaine séance recommandée</div>
    <div id="next-session-card"><span class="muted" style="font-size:.88rem">Chargement…</span></div>
  </div>

  <!-- Calendrier -->
  <div class="home-card">
    <div class="home-card-title">📆 Calendrier — 12 semaines</div>
    <div id="calendar-grid" class="cal-grid"></div>
    <div class="cal-legend">
      <span><span class="cal-dot" style="background:var(--bg-hover)"></span>Repos</span>
      <span><span class="cal-dot" style="background:var(--rust);opacity:.5"></span>Séance</span>
      <span><span class="cal-dot" style="background:var(--rust)"></span>Bonne séance</span>
    </div>
  </div>

  <!-- Records -->
  <div class="home-card">
    <div class="home-card-title">🏆 Records personnels</div>
    <div id="records-list"></div>
  </div>

  <div class="spacer"></div>
</div>

<footer>Gym AI Coach</footer>
<script src="/js/home.js"></script>
<script src="/js/nav.js"></script>
</body>
</html>
