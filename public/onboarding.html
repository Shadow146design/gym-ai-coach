<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bienvenue — Gym AI Coach</title>
<meta name="description" content="Bienvenue sur Gym AI Coach — configure ton profil pour commencer."/>
<meta property="og:title" content="Bienvenue — Gym AI Coach"/>
<meta property="og:description" content="Bienvenue sur Gym AI Coach — configure ton profil pour commencer."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="shell" style="max-width:720px;padding-top:40px">

  <div class="onboarding-steps">
    <div class="onboarding-step active" id="step-indicator-1"><span class="onboarding-step-num">1</span>Profil</div>
    <div class="onboarding-step-line"></div>
    <div class="onboarding-step" id="step-indicator-2"><span class="onboarding-step-num">2</span>Questionnaire</div>
    <div class="onboarding-step-line"></div>
    <div class="onboarding-step" id="step-indicator-3"><span class="onboarding-step-num">3</span>Programme</div>
  </div>

  <!-- Étape 1 — Profil physique -->
  <div class="card onboarding-panel" id="panel-1">
    <div class="card-title">Parle-nous un peu de toi</div>
    <p class="muted" style="font-size:.87rem;margin-bottom:20px">Ces informations permettent à l'IA d'adapter les charges et la difficulté à ton profil.</p>
    <form id="profile-form">
      <div class="two-col">
        <div class="field"><label for="weight_kg">Poids (kg)</label><input id="weight_kg" name="weight_kg" type="number" step="0.1" min="30" max="300" placeholder="75"/></div>
        <div class="field"><label for="height_cm">Taille (cm)</label><input id="height_cm" name="height_cm" type="number" min="100" max="250" placeholder="178"/></div>
      </div>
      <div class="two-col">
        <div class="field"><label for="age">Âge</label><input id="age" name="age" type="number" min="13" max="100" placeholder="25"/></div>
        <div class="field">
          <label for="gender">Genre</label>
          <select id="gender" name="gender">
            <option value="">Non précisé</option>
            <option value="homme">Homme</option>
            <option value="femme">Femme</option>
            <option value="autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="activity_level">Niveau d'activité quotidienne (hors sport)</label>
        <select id="activity_level" name="activity_level">
          <option value="">Non précisé</option>
          <option value="sedentaire">Sédentaire</option>
          <option value="legerement actif">Légèrement actif</option>
          <option value="actif">Actif</option>
          <option value="tres actif">Très actif</option>
        </select>
      </div>
      <div class="spacer-sm"></div>
      <button class="btn btn-primary btn-block" type="submit">Continuer →</button>
    </form>
  </div>

  <!-- Étape 2 — Questionnaire -->
  <div class="card onboarding-panel hidden" id="panel-2">
    <div class="card-title">Construisons ton programme</div>
    <p class="muted" style="font-size:.87rem;margin-bottom:20px">5 questions, 30 secondes. L'IA s'occupe du reste.</p>
    <form id="quiz-form">
      <div class="field">
        <label>Objectif principal</label>
        <div class="radio-grid" data-group="objectif">
          <label class="radio-card"><input type="radio" name="objectif" value="prise de masse / hypertrophie" required>Prise de masse</label>
          <label class="radio-card"><input type="radio" name="objectif" value="perte de poids / seche">Perte de poids</label>
          <label class="radio-card"><input type="radio" name="objectif" value="force pure">Force</label>
          <label class="radio-card"><input type="radio" name="objectif" value="remise en forme generale / endurance">Remise en forme</label>
        </div>
      </div>
      <div class="field">
        <label>Niveau</label>
        <div class="radio-grid" data-group="niveau">
          <label class="radio-card"><input type="radio" name="niveau" value="debutant" required>Débutant</label>
          <label class="radio-card"><input type="radio" name="niveau" value="intermediaire">Intermédiaire</label>
          <label class="radio-card"><input type="radio" name="niveau" value="avance">Avancé</label>
        </div>
      </div>
      <div class="field">
        <label>Jours d'entraînement par semaine</label>
        <div class="radio-grid" data-group="joursParSemaine">
          <label class="radio-card"><input type="radio" name="joursParSemaine" value="2" required>2 jours</label>
          <label class="radio-card"><input type="radio" name="joursParSemaine" value="3">3 jours</label>
          <label class="radio-card"><input type="radio" name="joursParSemaine" value="4">4 jours</label>
          <label class="radio-card"><input type="radio" name="joursParSemaine" value="5">5 jours</label>
          <label class="radio-card"><input type="radio" name="joursParSemaine" value="6">6 jours</label>
        </div>
      </div>
      <div class="field">
        <label>Durée max par séance</label>
        <div class="radio-grid" data-group="dureeSeance">
          <label class="radio-card"><input type="radio" name="dureeSeance" value="30 minutes" required>30 min</label>
          <label class="radio-card"><input type="radio" name="dureeSeance" value="45 minutes">45 min</label>
          <label class="radio-card"><input type="radio" name="dureeSeance" value="1 heure">1h</label>
          <label class="radio-card"><input type="radio" name="dureeSeance" value="1h30 ou plus">1h30+</label>
        </div>
      </div>
      <div class="field">
        <label>Matériel disponible</label>
        <div class="radio-grid" data-group="materiel">
          <label class="radio-card"><input type="radio" name="materiel" value="salle de sport complete avec machines et poids libres" required>Salle complète</label>
          <label class="radio-card"><input type="radio" name="materiel" value="haltères et banc seulement">Haltères + banc</label>
          <label class="radio-card"><input type="radio" name="materiel" value="poids du corps uniquement, pas de materiel">Poids du corps</label>
        </div>
      </div>
      <div class="field">
        <label for="limitations">Blessures ou limitations (optionnel)</label>
        <textarea id="limitations" name="limitations" placeholder="Ex : douleur à l'épaule droite, genoux fragiles…"></textarea>
      </div>
      <div class="spacer-sm"></div>
      <button class="btn btn-primary btn-block" type="submit" id="quiz-submit-btn">Générer mon programme ✨</button>
      <div id="quiz-error"></div>
    </form>
  </div>

  <!-- Étape 3 — Programme prêt -->
  <div class="card onboarding-panel hidden" id="panel-3">
    <div style="text-align:center;padding:20px 0">
      <div style="font-size:3rem;margin-bottom:10px">🎉</div>
      <div class="card-title" style="justify-content:center">Ton programme est prêt !</div>
      <div id="program-summary-preview" style="margin:18px 0;color:var(--chalk-dim);font-size:.9rem"></div>
      <a class="btn btn-primary btn-huge" href="/dashboard.html">Voir mon programme →</a>
    </div>
  </div>

</div>
<footer>Gym AI Coach</footer>
<script src="/js/onboarding.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
