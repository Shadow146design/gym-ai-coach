<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stats — Gym AI Coach</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="page-wrapper">
<div class="shell">
  <div class="page-head">
    <div>
      <h1>Statistiques</h1>
      <p class="sub muted">Toute ta progression au même endroit.</p>
    </div>
  </div>

  <!-- KPI globaux -->
  <div id="kpi-grid" class="kpi-grid"></div>

  <!-- Fréquence 4 semaines + volume muscles -->
  <div class="two-col" style="margin-bottom:24px">
    <div class="card">
      <div class="card-title">Fréquence (4 dernières semaines)</div>
      <div id="freq-chart" class="freq-bars"></div>
    </div>
    <div class="card">
      <div class="card-title" style="margin-bottom:14px">Volume par groupe musculaire (30j)</div>
      <div id="muscle-bars"></div>
    </div>
  </div>

  <!-- Records persos -->
  <h2 class="card-title" style="margin-bottom:14px;font-size:1.1rem">Records personnels 🏆</h2>
  <div id="records-grid" class="records-grid" style="margin-bottom:28px"></div>

  <!-- Courbe de progression par exercice -->
  <div class="card">
    <div class="flex-between" style="margin-bottom:16px">
      <div class="card-title" style="margin:0">Progression — Poids soulevé</div>
      <select id="exercise-select" style="width:auto;min-width:180px"></select>
    </div>
    <canvas id="progress-chart" height="90"></canvas>
  </div>

  <div id="empty-state" class="empty-state hidden" style="margin-top:20px">
    <h3>Aucune donnée</h3>
    <p class="muted" style="margin-top:8px">Logge ta première séance pour voir tes stats ici.</p>
    <a class="btn btn-primary" href="/session.html" style="margin-top:18px">Commencer une séance</a>
  </div>

  <div class="spacer"></div>
</div>

<footer>Gym AI Coach</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/js/stats.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
