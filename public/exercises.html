<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Exercices — Gym AI Coach</title>
<meta name="description" content="Bibliothèque de plus de 50 exercices de musculation avec démonstrations et conseils."/>
<meta property="og:title" content="Exercices — Gym AI Coach"/>
<meta property="og:description" content="Bibliothèque de plus de 50 exercices de musculation avec démonstrations et conseils."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell">
  <div class="page-head">
    <div>
      <h1 data-i18n="page_exercises_title">Bibliothèque d'exercices</h1>
      <p class="sub muted" data-i18n="page_exercises_sub">Plus de 50 exercices, filtrables par groupe musculaire.</p>
    </div>
  </div>

  <div class="exercise-search-row">
    <input id="exercise-search" type="text" list="exercise-search-list" placeholder="🔍 Rechercher un exercice…" autocomplete="off"/>
    <datalist id="exercise-search-list"></datalist>
    <select id="level-filter"><option value="Tous">Tous niveaux</option></select>
    <select id="equipment-filter"><option value="Tous">Tout équipement</option></select>
  </div>
  <div id="filter-bar" class="exercise-filters"></div>
  <div id="exercises-grid" class="exercises-grid"></div>
  <p id="exercises-empty" class="muted hidden" style="text-align:center;padding:30px">Aucun exercice ne correspond à ces filtres.</p>
</div>

<footer>Gym AI Coach</footer>
</div>
<script src="/js/exercises-data.js"></script>
<script src="/js/exercise-animations.js"></script>
<script src="/js/exercise-modal.js"></script>
<script src="/js/exercises.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
