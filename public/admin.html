<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Gym AI Coach</title>
<meta name="description" content="Panneau d'administration Gym AI Coach — gestion des utilisateurs et du contenu."/>
<meta property="og:title" content="Admin — Gym AI Coach"/>
<meta property="og:description" content="Panneau d'administration Gym AI Coach — gestion des utilisateurs et du contenu."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell">
  <div class="page-head"><h1 data-i18n="page_admin_title">Panneau d'administration</h1></div>

  <!-- KPI globaux -->
  <div id="admin-kpis" class="kpi-grid" style="margin-bottom:24px"></div>

  <!-- Système -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title">Système</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn btn-ghost btn-sm" type="button" id="test-email-btn">Tester l'envoi d'email (Resend)</button>
      <span id="test-email-status" class="muted" style="font-size:.85rem"></span>
    </div>
  </div>

  <!-- Athlètes certifiés (fonctionnalité 7) -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title" style="margin-bottom:14px">🎓 Athlètes certifiés</div>
    <div id="certified-list"></div>
  </div>

  <!-- Support / signalements de bug -->
  <div class="card" style="margin-bottom:24px">
    <div class="card-title" style="margin-bottom:14px">🐛 Support</div>
    <div id="support-tickets-list"></div>
  </div>

  <!-- Utilisateurs -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div class="card-title" style="margin:0">Tous les utilisateurs</div>
      <input id="search-users" type="text" placeholder="Rechercher…" style="width:220px" oninput="filterUsers(this.value)"/>
    </div>
    <div style="overflow-x:auto">
      <table id="users-table" style="width:100%;border-collapse:collapse;font-size:.85rem">
        <thead>
          <tr style="color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.04em;font-size:.72rem">
            <th style="padding:8px;text-align:left">Nom</th>
            <th style="padding:8px;text-align:left">Email</th>
            <th style="padding:8px;text-align:left">Rôle</th>
            <th style="padding:8px;text-align:right">Séances</th>
            <th style="padding:8px;text-align:left">Dernière séance</th>
            <th style="padding:8px"></th>
            <th style="padding:8px">Actions</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>
  </div>
</div>
<footer>Gym AI Coach</footer>
</div>
<script src="/js/admin.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
