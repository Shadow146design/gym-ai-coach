<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Coaches — Gym AI Coach</title>
<meta name="description" content="Trouve un coach sportif humain sur Gym AI Coach, en complément de ton coach IA."/>
<meta property="og:title" content="Coaches — Gym AI Coach"/>
<meta property="og:description" content="Trouve un coach sportif humain sur Gym AI Coach, en complément de ton coach IA."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell">
  <div class="page-head">
    <div><h1 data-i18n="page_coaches_title">Nos coaches</h1><p class="sub muted" data-i18n="page_coaches_sub">Des vrais experts pour t'accompagner personnellement.</p></div>
  </div>
  <div id="my-coach-banner" class="hidden" style="background:var(--green-bg);border:1px solid var(--green);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <span id="my-coach-txt"></span>
    <span id="my-coach-msg-btn"></span>
  </div>
  <div id="coaches-filters" class="hidden" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
    <select id="filter-specialty" style="max-width:220px">
      <option value="">Toutes spécialités</option>
    </select>
    <select id="filter-price" style="max-width:180px">
      <option value="">Tous tarifs</option>
      <option value="free">Gratuit</option>
      <option value="paid">Payant</option>
    </select>
  </div>
  <div id="coaches-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px"></div>
  <div id="empty" class="empty-state hidden"><h3>Aucun coach disponible</h3><p class="muted" style="margin-top:8px">Reviens bientôt !</p></div>
</div>
<footer>Gym AI Coach</footer>
</div>
<script src="/js/coaches.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
