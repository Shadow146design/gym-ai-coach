<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Questionnaire — Gym AI Coach</title>
<meta name="description" content="Réponds au questionnaire pour générer ton programme de musculation sur mesure."/>
<meta property="og:title" content="Questionnaire — Gym AI Coach"/>
<meta property="og:description" content="Réponds au questionnaire pour générer ton programme de musculation sur mesure."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell">
  <div class="page-head">
    <div>
      <h1>Construisons ton programme</h1>
      <p class="sub muted">5 questions, 30 secondes. L'IA s'occupe du reste.</p>
    </div>
  </div>

  <!-- Module E : choix du mode de questionnaire -->
  <div class="quiz-mode-toggle" style="max-width:720px">
    <button type="button" class="btn btn-primary" id="mode-form-btn">📋 Questions rapides</button>
    <button type="button" class="btn btn-ghost" id="mode-chat-btn">💬 Parler à l'IA (recommandé)</button>
  </div>

  <!-- Mode chat conversationnel -->
  <div class="chat-wrap hidden" id="quiz-chat-wrap" style="max-width:720px">
    <label class="periodization-toggle-row">
      <input type="checkbox" id="periodization-toggle"/>
      <span>📅 Programme progressif sur 12 semaines (périodisation) <span class="premium-badge-chip">⭐ Premium</span></span>
    </label>
    <div class="chat-messages" id="quiz-chat-messages"></div>
    <div class="chat-input-row">
      <input id="quiz-chat-input" type="text" placeholder="Écris ta réponse…" autocomplete="off" />
      <button type="button" class="mic-btn" id="quiz-chat-mic-btn" title="Dicter" aria-label="Dicter">🎤</button>
      <button class="btn btn-primary" id="quiz-chat-send-btn">Envoyer</button>
    </div>
    <div id="quiz-chat-error"></div>
  </div>

  <form id="quiz-form" class="card" style="max-width:720px">

    <div class="field">
      <label>Objectif principal</label>
      <div class="radio-grid" data-group="objectif">
        <label class="radio-card"><input type="radio" name="objectif" value="prise de masse / hypertrophie" required>Prise de masse</label>
        <label class="radio-card"><input type="radio" name="objectif" value="perte de poids / seche">Perte de poids</label>
        <label class="radio-card"><input type="radio" name="objectif" value="force pure">Force</label>
        <label class="radio-card"><input type="radio" name="objectif" value="remise en forme generale / endurance">Remise en forme</label>
      </div>
    </div>

    <div class="field">
      <label>Niveau</label>
      <div class="radio-grid" data-group="niveau">
        <label class="radio-card"><input type="radio" name="niveau" value="debutant" required>Débutant</label>
        <label class="radio-card"><input type="radio" name="niveau" value="intermediaire">Intermédiaire</label>
        <label class="radio-card"><input type="radio" name="niveau" value="avance">Avancé</label>
      </div>
    </div>

    <div class="field">
      <label>Jours d'entraînement par semaine</label>
      <div class="radio-grid" data-group="joursParSemaine">
        <label class="radio-card"><input type="radio" name="joursParSemaine" value="2" required>2 jours</label>
        <label class="radio-card"><input type="radio" name="joursParSemaine" value="3">3 jours</label>
        <label class="radio-card"><input type="radio" name="joursParSemaine" value="4">4 jours</label>
        <label class="radio-card"><input type="radio" name="joursParSemaine" value="5">5 jours</label>
        <label class="radio-card"><input type="radio" name="joursParSemaine" value="6">6 jours</label>
      </div>
    </div>

    <div class="field">
      <label>Durée max par séance</label>
      <div class="radio-grid" data-group="dureeSeance">
        <label class="radio-card"><input type="radio" name="dureeSeance" value="30 minutes" required>30 min</label>
        <label class="radio-card"><input type="radio" name="dureeSeance" value="45 minutes">45 min</label>
        <label class="radio-card"><input type="radio" name="dureeSeance" value="1 heure">1h</label>
        <label class="radio-card"><input type="radio" name="dureeSeance" value="1h30 ou plus">1h30+</label>
      </div>
    </div>

    <div class="field">
      <label>Matériel disponible</label>
      <div class="radio-grid" data-group="materiel">
        <label class="radio-card"><input type="radio" name="materiel" value="salle de sport complete avec machines et poids libres" required>Salle complète</label>
        <label class="radio-card"><input type="radio" name="materiel" value="haltères et banc seulement">Haltères + banc</label>
        <label class="radio-card"><input type="radio" name="materiel" value="poids du corps uniquement, pas de materiel">Poids du corps</label>
      </div>
    </div>

    <div class="field">
      <label for="limitations">Blessures ou limitations (optionnel)</label>
      <textarea id="limitations" name="limitations" placeholder="Ex : douleur à l'épaule droite, genoux fragiles…"></textarea>
    </div>

    <!-- Champ caché pour les retours coach IA -->
    <input type="hidden" id="feedback-input" name="feedback" value="" />

    <div id="feedback-banner" class="hidden" style="background:var(--rust-bg);border:1px solid rgba(201,77,40,.25);border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:.85rem;color:var(--chalk-dim)">
      ✅ Retours du coach IA pris en compte pour ce nouveau programme.
    </div>

    <div class="spacer-sm"></div>
    <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Générer mon programme ✨</button>
    <div id="quiz-error"></div>
  </form>
</div>

<footer>Gym AI Coach</footer>
</div>
<script src="/js/premium-gate.js"></script>
<script src="/js/voice-input.js"></script>
<script src="/js/questionnaire.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
