<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — Gym AI Coach</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell" style="max-width:900px">
  <div class="page-head"><h1 data-i18n="page_messages_title">Messages</h1></div>

  <div class="messages-shell">
    <!-- Liste conversations -->
    <div class="conv-panel" id="conv-panel">
      <div class="conv-panel-head">Conversations</div>
      <div class="conv-search-wrap" id="conv-search-wrap">
        <input id="conv-search" type="text" class="conv-search" placeholder="Rechercher…" autocomplete="off"/>
      </div>
      <div id="conv-list"></div>
      <div id="conv-search-empty" class="hidden messages-empty">
        <p class="muted" style="font-size:.85rem">Aucune conversation trouvée.</p>
      </div>
      <div id="conv-empty" class="hidden messages-empty">
        <div class="messages-empty-icon">💬</div>
        <p>Tu n'as pas encore de messages.</p>
        <p class="muted" style="font-size:.82rem">Choisis un coach sur la page Coaches pour commencer à échanger.</p>
        <a class="btn btn-primary btn-sm" href="/coaches.html">Voir les coaches</a>
      </div>
    </div>

    <!-- Zone de chat -->
    <div class="chat-panel" id="chat-panel">
      <div id="chat-header" class="chat-panel-head"></div>
      <div id="review-invite" class="hidden"></div>
      <div id="chat-msgs" class="chat-panel-msgs"></div>
      <div id="chat-placeholder" class="messages-empty">
        <div class="messages-empty-icon">👈</div>
        <p class="muted">Choisis une conversation à gauche.</p>
      </div>
      <form id="chat-form" class="hidden chat-panel-input">
        <input id="msg-input" type="text" placeholder="Écris ton message…" autocomplete="off"/>
        <button type="button" class="mic-btn" id="msg-mic-btn" title="Dicter" aria-label="Dicter">🎤</button>
        <button class="btn btn-primary btn-icon" type="submit" title="Envoyer">➤</button>
      </form>
    </div>
  </div>
</div>
<footer>Gym AI Coach</footer>
</div>
<script src="/js/voice-input.js"></script>
<script src="/js/messages.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
