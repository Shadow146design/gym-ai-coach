<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Messages — Gym AI Coach</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell" style="max-width:800px">
  <div class="page-head"><h1 data-i18n="page_messages_title">Messages</h1></div>
  <div style="display:grid;grid-template-columns:240px 1fr;gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;height:550px">
    <!-- Liste conversations -->
    <div style="border-right:1px solid var(--border);overflow-y:auto">
      <div style="padding:12px 14px;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--chalk-dim);border-bottom:1px solid var(--border)">Conversations</div>
      <div id="conv-list"></div>
      <div id="conv-empty" class="hidden" style="padding:20px 14px;font-size:.85rem;color:var(--chalk-dim)">Aucune conversation.</div>
    </div>
    <!-- Zone de chat -->
    <div style="display:flex;flex-direction:column">
      <div id="chat-header" style="padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;min-height:50px"></div>
      <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px"></div>
      <div id="chat-form" class="hidden" style="padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px">
        <input id="msg-input" type="text" placeholder="Écris ton message…" style="flex:1" autocomplete="off"/>
        <button class="btn btn-primary btn-sm" onclick="sendMsg()">Envoyer</button>
      </div>
    </div>
  </div>
</div>
<footer>Gym AI Coach</footer>
</div>
<script src="/js/messages.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/sidebar.js"></script>
</body>
</html>
