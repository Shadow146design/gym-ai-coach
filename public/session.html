<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Séance — Gym AI Coach</title>
<meta name="description" content="Suis ta séance de musculation en direct avec minuteur de repos et coach IA."/>
<meta property="og:title" content="Séance — Gym AI Coach"/>
<meta property="og:description" content="Suis ta séance de musculation en direct avec minuteur de repos et coach IA."/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#c94d28"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="page-wrapper">
<div class="shell">

  <div id="step-pick" class="hidden">
    <div class="page-head"><div><h1>Quelle séance aujourd'hui ?</h1></div></div>
    <div id="day-pick-grid" style="display:flex;flex-direction:column;gap:10px;max-width:500px"></div>
  </div>

  <div id="step-warmup" class="hidden">
    <div class="page-head">
      <div>
        <h1>Échauffement 🔥</h1>
        <p class="sub muted" id="warmup-subtitle"></p>
      </div>
      <button class="btn btn-ghost btn-sm" id="warmup-skip-btn" type="button">Passer l'échauffement</button>
    </div>
    <div class="warmup-card" id="warmup-card">
      <div class="warmup-progress" id="warmup-progress"></div>
      <div class="warmup-exercise">
        <div class="warmup-timer" id="warmup-timer">45</div>
        <h2 id="warmup-ex-name"></h2>
        <p class="muted" id="warmup-ex-desc"></p>
      </div>
    </div>
    <div id="warmup-done" class="hidden" style="text-align:center;margin-top:32px">
      <h2>Échauffement terminé 💪</h2>
      <p class="muted" style="margin:8px 0 20px">Tu es prêt, place à la séance !</p>
      <button class="btn btn-primary" id="warmup-start-btn" type="button">C'est parti !</button>
    </div>
  </div>

  <div id="step-session" class="hidden">
    <div class="page-head">
      <div>
        <h1 id="session-day-title">Séance</h1>
        <p class="sub muted" id="session-day-focus"></p>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <button class="btn btn-ghost btn-sm" id="focus-mode-btn" type="button">🎯 Mode Focus</button>
        <div id="session-timer" class="mono" style="font-size:1.5rem;color:var(--rust-soft)">00:00</div>
      </div>
    </div>
    <button id="focus-exit-btn" class="focus-exit-btn hidden" type="button">✕ Quitter le mode focus</button>
    <div class="session-progress-wrap">
      <div class="session-progress-bar"><div class="session-progress-fill" id="session-progress-fill"></div></div>
      <div class="session-progress-label" id="session-progress-label">0/0 exercices complétés</div>
    </div>
    <div id="session-exercises"></div>
    <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-primary" id="finish-btn">Terminer la séance ✓</button>
      <a class="btn btn-ghost" href="/dashboard.html">Annuler</a>
    </div>
  </div>

  <div id="step-recap" class="hidden">
    <div class="page-head">
      <div><h1>Récap de la séance 🏆</h1></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="share-session-btn" type="button">📱 Partager ma séance</button>
        <button class="btn btn-ghost btn-sm hidden" id="share-coach-btn" type="button">🤝 Partager avec mon coach</button>
        <a class="btn btn-ghost" href="/home.html">Retour à l'accueil</a>
      </div>
    </div>
    <div id="recap-stats" class="kpi-grid" style="margin-bottom:20px"></div>
    <div id="recap-muscle-radar" class="chart-wrap hidden" style="margin-bottom:20px">
      <div class="card-title">Muscles travaillés</div>
      <canvas id="session-muscle-radar" height="180"></canvas>
    </div>
    <div id="recap-exercises" style="margin-bottom:20px"></div>

    <!-- Debrief IA -->
    <div id="debrief-card" class="card" style="display:none;margin-bottom:20px;border-left:3px solid var(--rust)"></div>

    <div class="spacer-sm"></div>
    <div class="chart-wrap">
      <div class="card-title">Volume total par séance (kg)</div>
      <canvas id="volume-chart" height="90"></canvas>
    </div>
  </div>

  <div id="loading" class="empty-state" style="margin-top:40px">
    <p class="muted">Chargement…</p>
  </div>

</div>

<footer>Gym AI Coach</footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="/js/premium-gate.js"></script>
<script src="/js/voice-input.js"></script>
<script src="/js/offline-sync.js"></script>
<script src="/js/exercises-data.js"></script>
<script src="/js/exercise-modal.js"></script>
<script src="/js/session.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/bug-report.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/pwa.js"></script>
</body>
</html>
